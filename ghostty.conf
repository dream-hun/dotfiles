# Font — matches original iTerm2 profile (FiraCode Nerd Font SemiBold 25)
font-family = FiraCode Nerd Font Mono
font-size = 25
font-feature = +calt

# Colors — translated from lovelace.itermcolors (dark variants)
background = 1d1f28
foreground = fdfdfd
cursor-color = c574dd
selection-background = c1deff
selection-foreground = 000000

# ANSI palette (0-7 normal, 8-15 bright)
palette = 0=#282a36
palette = 1=#f37f97
palette = 2=#5adece
palette = 3=#f2a272
palette = 4=#8897f4
palette = 5=#c574dd
palette = 6=#79e6f3
palette = 7=#fdfdfd
palette = 8=#414458
palette = 9=#ff4971
palette = 10=#18e3c8
palette = 11=#ff8037
palette = 12=#556fff
palette = 13=#b043d1
palette = 14=#3fdcee
palette = 15=#bebec1

# Window padding — matches iTerm2 margins (50px horizontal, 20px vertical)
window-padding-x = 20
window-padding-y = 10

# Cursor
cursor-style = block
cursor-style-blink = false

# Scrollback
scrollback-limit = 10000

# Terminal
term = xterm-256color
